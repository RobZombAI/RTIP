<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RTIP — ReadingTextImgPdf</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
  --border: #30363d; --text: #e6edf3; --text2: #8b949e;
  --accent: #58a6ff; --accent2: #1f6feb; --success: #3fb950;
  --error: #f85149; --warning: #d29922;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
header { padding:10px 18px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
header h1 { font-size:15px; font-weight:600; flex:1; }
header h1 span { color:var(--accent); }

.status-bar { display:flex; gap:12px; padding:6px 18px; background:var(--surface); border-bottom:1px solid var(--border); font-size:11px; align-items:center; flex-wrap:wrap; }
.status-item { display:flex; align-items:center; gap:6px; }
.status-dot { width:8px; height:8px; border-radius:50%; }
.status-dot.on { background:var(--success); }
.status-dot.loading { background:var(--warning); animation:pulse 1s infinite; }
.status-dot.off { background:var(--text2); }
@keyframes pulse { 50% { opacity:.4; } }
.status-btn { font-size:10px; padding:2px 8px; border-radius:4px; border:1px solid var(--border); background:var(--surface2); color:var(--text); cursor:pointer; }
.status-btn:hover { border-color:var(--accent); }
.status-btn.stop { border-color:var(--error); color:var(--error); }
.status-label { color:var(--text2); }

.main { flex:1; display:flex; flex-direction:column; padding:14px; gap:10px; overflow:hidden; position:relative; }
.drop-zone { border:2px dashed var(--border); border-radius:8px; padding:22px; text-align:center; cursor:pointer; transition:.2s; background:var(--surface); }
.drop-zone:hover { border-color:var(--accent); background:var(--surface2); }
.drop-zone .icon { font-size:26px; margin-bottom:4px; }
.drop-zone .label { font-size:12px; color:var(--text2); }
.drop-zone .sub { font-size:11px; color:var(--text2); margin-top:2px; }
.drop-zone.has-file { padding:6px; border-style:solid; border-color:var(--accent2); display:flex; align-items:center; gap:10px; }
.drop-zone.has-file img { height:50px; border-radius:4px; cursor:pointer; }
.file-meta { flex:1; text-align:left; }
.file-name { font-size:12px; font-weight:500; }
.file-info { font-size:11px; color:var(--text2); margin-top:2px; }
.file-badge { font-size:9px; font-weight:600; padding:1px 6px; border-radius:3px; }
.badge-image { background:var(--accent2); color:#fff; }
.badge-pdf { background:var(--error); color:#fff; }

.info-box { display:none; padding:8px 12px; border-radius:5px; font-size:11px; margin-top:-4px; }
.info-box.visible { display:flex; align-items:center; gap:8px; }
.info-pdf { background:rgba(210,153,34,.1); border:1px solid var(--warning); color:var(--warning); }
.info-image { background:rgba(88,166,255,.1); border:1px solid var(--accent); color:var(--accent); }

.controls { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.controls input[type="text"] { flex:1; padding:8px 10px; border:1px solid var(--border); border-radius:5px; background:var(--surface); color:var(--text); font-size:12px; outline:none; }
.controls input:focus { border-color:var(--accent); }
.btn { padding:7px 16px; border:none; border-radius:5px; font-size:12px; font-weight:600; cursor:pointer; transition:.15s; white-space:nowrap; display:inline-flex; align-items:center; gap:5px; }
.btn:disabled { opacity:.4; cursor:not-allowed; }
.btn-primary { background:var(--accent2); color:#fff; }
.btn-primary:hover:not(:disabled) { background:var(--accent); }
.btn-primary.loading { pointer-events:none; opacity:.7; }
.btn-ghost { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
.btn-ghost:hover { border-color:var(--text2); }
.btn-success { background:var(--success); color:#000; }
.btn-sm { font-size:10px; padding:2px 10px; }

.progress-overlay { position:absolute; inset:0; background:rgba(13,17,23,.92); z-index:15; display:none; align-items:center; justify-content:center; border-radius:8px; }
.progress-overlay.visible { display:flex !important; }
.progress-inner { text-align:center; }
.progress-label { color:var(--text); font-size:14px; margin-top:8px; }
.progress-detail { font-size:11px; color:var(--text2); margin-top:4px; }

.result-area { flex:1; overflow-y:auto; background:var(--surface); border:1px solid var(--border); border-radius:8px; display:none; flex-direction:column; }
.result-area.visible { display:flex; }
.result-header { display:flex; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid var(--border); background:var(--surface2); position:sticky; top:0; z-index:1; flex-wrap:wrap; }
.result-header .title { flex:1; font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; }
.page-nav { display:flex; align-items:center; gap:4px; font-size:11px; }
.page-nav button { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:2px 10px; border-radius:4px; cursor:pointer; font-size:11px; }
.page-nav button:hover { border-color:var(--accent); }
.page-nav button:disabled { opacity:.3; cursor:default; }
.page-info { color:var(--text2); padding:0 4px; }

.result-body { flex:1; overflow-y:auto; padding:10px 14px; }
.result-body pre { font-size:13px; line-height:1.6; white-space:pre-wrap; word-break:break-word; color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }

/* Chat area for LLM analysis */
.chat-section { display:none; border-top:1px solid var(--border); background:var(--surface); padding:8px 12px; }
.chat-section.visible { display:flex; flex-direction:column; gap:6px; }
.chat-input { display:flex; gap:6px; }
.chat-input textarea { flex:1; min-height:36px; max-height:80px; padding:6px 10px; border:1px solid var(--border); border-radius:5px; background:var(--bg); color:var(--text); font-size:12px; outline:none; resize:vertical; }
.chat-input textarea:focus { border-color:var(--accent); }
.chat-msg { padding:6px 10px; border-radius:6px; max-width:90%; font-size:12px; line-height:1.5; white-space:pre-wrap; }
.chat-msg.user { background:var(--accent2); color:#fff; align-self:flex-end; }
.chat-msg.assistant { background:var(--surface2); color:var(--text); border:1px solid var(--border); align-self:flex-start; }
.chat-msg.system { background:var(--warning); color:#000; align-self:center; font-size:11px; }
.chat-messages { max-height:200px; overflow-y:auto; display:flex; flex-direction:column; gap:4px; }

.loading-indicator { text-align:center; padding:30px; color:var(--text2); }
.spinner { display:inline-block; width:20px; height:20px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin-bottom:8px; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-dots::after { content:'...'; animation:dots 1.5s steps(4) infinite; }
@keyframes dots { 25% { content:'.'; } 50% { content:'..'; } 75% { content:'...'; } }

.save-toast { display:none; align-items:center; gap:6px; padding:6px 10px; background:rgba(63,185,80,.1); border:1px solid var(--success); border-radius:5px; font-size:11px; color:var(--success); }
.save-toast.visible { display:flex; }
.save-toast .path { flex:1; color:var(--text2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.error-banner { display:none; padding:8px 12px; background:rgba(248,81,73,.1); border:1px solid var(--error); border-radius:5px; color:var(--error); font-size:11px; }
.error-banner.visible { display:block; }
.copy-toast { position:fixed; bottom:50px; left:50%; transform:translateX(-50%); background:var(--success); color:#000; padding:6px 16px; border-radius:6px; font-size:12px; font-weight:600; opacity:0; transition:opacity .3s; pointer-events:none; z-index:200; }
.copy-toast.visible { opacity:1; }
footer { text-align:center; padding:4px; font-size:9px; color:var(--text2); border-top:1px solid var(--border); background:var(--surface); }
</style>
</head>
<body>
<header>
  <h1>📖 <span>RTIP</span> · ReadingTextImgPdf</h1>
</header>
<div class="status-bar">
  <div class="status-item"><span class="status-dot off" id="ocrDot"></span><span class="status-label">OCR:</span>
    <button class="status-btn" id="ocrStart" onclick="startModel('ocr')">▶</button>
    <button class="status-btn stop" id="ocrStop" onclick="stopModel('ocr')" style="display:none">⏹</button>
  </div>
  <div class="status-item"><span class="status-dot off" id="llmDot"></span><span class="status-label">LLM:</span>
    <button class="status-btn" id="llmStart" onclick="startModel('llm')">▶</button>
    <button class="status-btn stop" id="llmStop" onclick="stopModel('llm')" style="display:none">⏹</button>
  </div>
</div>
<div class="main">
  <div class="progress-overlay" id="progressOverlay">
    <div class="progress-inner">
      <div class="spinner" style="width:32px;height:32px;border-width:4px"></div>
      <div class="progress-label" id="progressLabel">Loading…</div>
      <div class="progress-detail" id="progressDetail"></div>
      <button class="btn btn-danger" onclick="cancelCurrent()" style="margin-top:8px">⏹ Cancel</button>
    </div>
  </div>
  <div class="error-banner" id="errorBanner"></div>
  <div class="drop-zone" id="dropZone">
    <div id="dropContent">
      <div class="icon">📁</div>
      <div class="label">Click to select image or PDF</div>
      <div class="sub">Images → OCR · PDFs → text extraction + AI analysis</div>
    </div>
    <div id="filePreview" style="display:none">
      <img id="previewImg" style="height:50px;border-radius:4px;cursor:pointer;display:none">
      <div class="file-meta">
        <div class="file-name" id="fileName"></div>
        <div class="file-info"><span class="file-badge" id="fileBadge"></span> <span id="fileSize"></span></div>
      </div>
    </div>
  </div>
  <div class="info-box" id="infoBox"></div>
  <div class="controls" id="actionBar">
    <button class="btn btn-primary" id="actionBtn" disabled>▶ Process</button>
    <input type="text" id="promptInput" value="Extract all text from this document." placeholder="Prompt…" style="flex:0;width:0;padding:0;border:none">
  </div>
  <div class="save-toast" id="saveToast">
    <span>💾</span><span class="path" id="savePath"></span>
    <button class="btn btn-ghost btn-sm" onclick="copyText(currentFullText)">📋 Copy</button>
    <button class="btn btn-ghost btn-sm" onclick="openFolder()">📂 Open</button>
  </div>
  <div class="result-area" id="resultArea">
    <div class="result-header">
      <span class="title" id="resultTitle">Result</span>
      <div class="page-nav" id="pageNav" style="display:none">
        <button id="prevPg" onclick="prevPage()">◀</button>
        <span class="page-info"><span id="pageNum">1</span>/<span id="pageTotal">1</span></span>
        <button id="nextPg" onclick="nextPage()">▶</button>
        <button class="btn btn-success btn-sm" id="analyzeBtn" onclick="openAnalyze()" style="display:none">🤖 Analyze</button>
      </div>
    </div>
    <div class="result-body" id="resultBody"><div class="loading-indicator"><div class="spinner"></div><div>Ready</div></div></div>
    <div class="chat-section" id="chatSection">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input">
        <textarea id="chatInput" placeholder="Ask about this document…" rows="1"></textarea>
        <button class="btn btn-primary btn-sm" onclick="chatSend()">➤</button>
      </div>
    </div>
  </div>
</div>
<footer>LightOnOCR-2-1B · Agents A1 · Apple M5 Max</footer>
<div class="copy-toast" id="copyToast">✅ Copied</div>
<script src="api.js"></script>
</body>
</html>
