<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RTIP — ReadingTextImgPdf</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
  --border: #30363d; --text: #e6edf3; --text2: #8b949e;
  --accent: #58a6ff; --accent2: #1f6feb; --success: #3fb950;
  --error: #f85149; --warning: #d29922;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
header { padding:8px 16px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
header h1 { font-size:14px; font-weight:600; flex:1; }
header h1 span { color:var(--accent); }
.status-bar { display:flex; gap:10px; padding:4px 16px; background:var(--surface); border-bottom:1px solid var(--border); font-size:10px; align-items:center; }
.status-item { display:flex; align-items:center; gap:4px; }
.status-dot { width:7px; height:7px; border-radius:50%; }
.status-dot.on { background:var(--success); }
.status-dot.loading { background:var(--warning); animation:pulse 1s infinite; }
.status-dot.off { background:var(--text2); }
@keyframes pulse { 50% { opacity:.4; } }
.status-label { color:var(--text2); }

.container { flex:1; display:flex; overflow:hidden; }

/* ── Sidebar ── */
.sidebar { width:200px; min-width:200px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.sidebar h2 { font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; padding:10px 12px; border-bottom:1px solid var(--border); letter-spacing:.5px; }
.session-list { flex:1; overflow-y:auto; }
.session-item { padding:8px 12px; border-bottom:1px solid var(--border); cursor:pointer; transition:.1s; }
.session-item:hover { background:var(--surface2); }
.session-item.active { background:var(--surface2); border-left:3px solid var(--accent); }
.session-item .name { font-size:11px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.session-item .meta { font-size:9px; color:var(--text2); margin-top:2px; display:flex; gap:4px; align-items:center; }
.session-item .del { margin-left:auto; color:var(--error); cursor:pointer; font-size:11px; padding:0 2px; }
.session-item .del:hover { color:#fff; }
.badge-type { font-size:8px; padding:1px 4px; border-radius:3px; font-weight:600; }
.badge-image { background:var(--accent2); color:#fff; }
.badge-pdf { background:var(--error); color:#fff; }

/* ── Main ── */
.main { flex:1; display:flex; flex-direction:column; padding:12px; gap:8px; overflow:hidden; position:relative; }
.drop-zone { border:2px dashed var(--border); border-radius:8px; padding:18px; text-align:center; cursor:pointer; transition:.2s; background:var(--surface); flex-shrink:0; }
.drop-zone:hover { border-color:var(--accent); background:var(--surface2); }
.drop-zone .icon { font-size:22px; margin-bottom:2px; }
.drop-zone .label { font-size:11px; color:var(--text2); }
.drop-zone .sub { font-size:10px; color:var(--text2); margin-top:1px; }
.drop-zone.has-file { padding:6px; border-style:solid; border-color:var(--accent2); display:flex; align-items:center; gap:8px; }
.drop-zone.has-file img { height:40px; border-radius:4px; cursor:pointer; }
.file-meta { flex:1; text-align:left; }
.file-name { font-size:11px; font-weight:500; }
.file-info { font-size:10px; color:var(--text2); margin-top:1px; }

.controls { display:flex; gap:6px; align-items:center; flex-shrink:0; }
.btn { padding:6px 14px; border:none; border-radius:5px; font-size:11px; font-weight:600; cursor:pointer; transition:.15s; white-space:nowrap; display:inline-flex; align-items:center; gap:4px; }
.btn:disabled { opacity:.4; cursor:not-allowed; }
.btn-primary { background:var(--accent2); color:#fff; }
.btn-primary:hover:not(:disabled) { background:var(--accent); }
.btn-primary.loading { pointer-events:none; opacity:.7; }
.btn-danger { background:var(--error); color:#fff; }
.btn-danger:hover { filter:brightness(1.2); }
.btn-ghost { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
.btn-ghost:hover { border-color:var(--text2); }
.btn-sm { font-size:10px; padding:2px 8px; }

.action-btns { display:flex; gap:4px; flex-shrink:0; }
.action-btns .btn { font-size:10px; padding:3px 10px; }
.action-btns .btn.active { background:var(--accent2); color:#fff; }

.progress-overlay { position:absolute; inset:0; background:rgba(13,17,23,.92); z-index:15; display:none; align-items:center; justify-content:center; border-radius:8px; flex-direction:column; gap:8px; }
.progress-overlay.visible { display:flex !important; }
.progress-inner { text-align:center; }
.progress-label { color:var(--text); font-size:13px; margin-top:6px; }
.progress-detail { font-size:10px; color:var(--text2); margin-top:3px; }

.result-area { flex:1; overflow-y:auto; background:var(--surface); border:1px solid var(--border); border-radius:8px; display:none; flex-direction:column; }
.result-area.visible { display:flex; }
.result-header { display:flex; align-items:center; gap:6px; padding:6px 10px; border-bottom:1px solid var(--border); background:var(--surface2); position:sticky; top:0; z-index:1; flex-wrap:wrap; }
.result-header .title { flex:1; font-size:10px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; }
.result-body { flex:1; overflow-y:auto; padding:8px 12px; }
.result-body pre { font-size:12px; line-height:1.5; white-space:pre-wrap; word-break:break-word; color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }

.page-nav { display:flex; align-items:center; gap:4px; font-size:10px; }
.page-nav button { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:1px 8px; border-radius:3px; cursor:pointer; font-size:10px; }
.page-nav button:disabled { opacity:.3; cursor:default; }

/* Chat */
.chat-section { display:none; border-top:1px solid var(--border); background:var(--surface); padding:6px 10px; flex-shrink:0; }
.chat-section.visible { display:flex; flex-direction:column; gap:4px; }
.chat-input { display:flex; gap:4px; }
.chat-input textarea { flex:1; min-height:30px; max-height:60px; padding:4px 8px; border:1px solid var(--border); border-radius:4px; background:var(--bg); color:var(--text); font-size:11px; outline:none; resize:vertical; }
.chat-input textarea:focus { border-color:var(--accent); }
.chat-msg { padding:4px 8px; border-radius:4px; max-width:90%; font-size:11px; line-height:1.4; white-space:pre-wrap; }
.chat-msg.user { background:var(--accent2); color:#fff; align-self:flex-end; }
.chat-msg.assistant { background:var(--surface2); color:var(--text); border:1px solid var(--border); align-self:flex-start; }
.chat-msg.system { background:var(--warning); color:#000; align-self:center; font-size:10px; }
.chat-messages { max-height:150px; overflow-y:auto; display:flex; flex-direction:column; gap:3px; }

.loading-indicator { text-align:center; padding:20px; color:var(--text2); }
.spinner { display:inline-block; width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin-bottom:6px; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-dots::after { content:'...'; animation:dots 1.5s steps(4) infinite; }
@keyframes dots { 25% { content:'.'; } 50% { content:'..'; } 75% { content:'...'; } }

.save-toast { display:none; align-items:center; gap:4px; padding:4px 8px; background:rgba(63,185,80,.1); border:1px solid var(--success); border-radius:4px; font-size:10px; color:var(--success); flex-shrink:0; }
.save-toast.visible { display:flex; }
.save-toast .path { flex:1; color:var(--text2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.error-banner { display:none; padding:6px 10px; background:rgba(248,81,73,.1); border:1px solid var(--error); border-radius:4px; color:var(--error); font-size:10px; flex-shrink:0; }
.error-banner.visible { display:block; }
.copy-toast { position:fixed; bottom:40px; left:50%; transform:translateX(-50%); background:var(--success); color:#000; padding:5px 14px; border-radius:6px; font-size:11px; font-weight:600; opacity:0; transition:opacity .3s; pointer-events:none; z-index:200; }
.copy-toast.visible { opacity:1; }
footer { text-align:center; padding:3px; font-size:8px; color:var(--text2); border-top:1px solid var(--border); background:var(--surface); }
</style>
</head>
<body>
<header>
  <h1>📖 <span>RTIP</span> · ReadingTextImgPdf</h1>
  <span id="sessionCount" style="font-size:10px;color:var(--text2)"></span>
</header>
<div class="status-bar" id="statusBar">
  <div class="status-item"><span class="status-dot off" id="ocrDot"></span><span class="status-label">OCR</span></div>
  <div class="status-item"><span class="status-dot off" id="llmDot"></span><span class="status-label">LLM</span></div>
  <button class="btn btn-danger btn-sm" id="globalCancelBtn" onclick="cancelCurrent()" style="display:none;margin-left:auto">⏹ STOP</button>
</div>
<div class="container">
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>📂 Sessions</h2>
    <div class="session-list" id="sessionList">
      <div style="padding:12px;font-size:10px;color:var(--text2);text-align:center">No sessions yet</div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="progress-overlay" id="progressOverlay">
      <div class="progress-inner">
        <div class="spinner" style="width:28px;height:28px;border-width:3px"></div>
        <div class="progress-label" id="progressLabel">Loading…</div>
        <div class="progress-detail" id="progressDetail"></div>
        <button class="btn btn-primary" onclick="cancelCurrent()" style="margin-top:6px;background:var(--error)">⏹ Cancel</button>
      </div>
    </div>
    <div class="error-banner" id="errorBanner"></div>

    <div class="drop-zone" id="dropZone">
      <div id="dropContent">
        <div class="icon">📁</div>
        <div class="label">Click to select image or PDF</div>
        <div class="sub">Images → OCR · PDFs → text extraction + AI</div>
      </div>
      <div id="filePreview" style="display:none">
        <img id="previewImg" style="height:40px;border-radius:4px;cursor:pointer;display:none">
        <div class="file-meta">
          <div class="file-name" id="fileName"></div>
          <div class="file-info"><span id="fileBadge" style="font-size:8px;font-weight:600;padding:1px 4px;border-radius:3px"></span> <span id="fileSize"></span></div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-primary" id="actionBtn" disabled>▶ Process</button>
      <div class="action-btns" id="actionBtns" style="display:none">
        <button class="btn btn-ghost btn-sm" onclick="llmAction('translate')">🌐 Translate</button>
        <button class="btn btn-ghost btn-sm" onclick="llmAction('summarize')">📝 Summarize</button>
        <button class="btn btn-ghost btn-sm" onclick="llmAction('rewrite')">✏️ Rewrite</button>
      </div>
    </div>

    <div class="save-toast" id="saveToast">
      <span>💾</span><span class="path" id="savePath"></span>
      <button class="btn btn-ghost btn-sm" onclick="copyAll()">📋 Copy</button>
      <button class="btn btn-ghost btn-sm" onclick="openFolder()">📂 Open</button>
    </div>

    <div class="result-area" id="resultArea">
      <div class="result-header">
        <span class="title" id="resultTitle">Ready</span>
        <div class="page-nav" id="pageNav" style="display:none">
          <button id="prevPg" onclick="prevPage()">◀</button>
          <span><span id="pageNum">1</span>/<span id="pageTotal">1</span></span>
          <button id="nextPg" onclick="nextPage()">▶</button>
        </div>
      </div>
      <div class="result-body" id="resultBody"><div class="loading-indicator"><div class="spinner"></div><div>Select a file to start</div></div></div>
      <div class="chat-section" id="chatSection">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input">
          <textarea id="chatInput" placeholder="Ask about this document…" rows="1"></textarea>
          <button class="btn btn-primary btn-sm" onclick="chatSend()">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>
<footer>LightOnOCR-2-1B · Agents A1 · Apple M5 Max</footer>
<div class="copy-toast" id="copyToast">✅ Copied</div>
<script src="api.js"></script>
</body>
</html>
